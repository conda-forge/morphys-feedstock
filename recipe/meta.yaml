{% set name = "morphys" %}
{% set version = "1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/mkalinski/{{ name }}/tarball/master
  sha256: 9367b1745fcb37c7baf99182e0b08901eb452bd5ab9dd99034ff67c71548e9dc
  fn: master.tgz

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}

test:
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/mkalinski/morphys
  summary: Smart conversions between unicode and bytes types for common cases in python. 
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - spinoch
